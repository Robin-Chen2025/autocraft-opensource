[pytest]
# pytest配置模板
# 位置：项目根目录

# asyncio模式
asyncio_mode = auto

# 测试路径
testpaths = tests

# 测试文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试发现
addopts =
    -v               # 详细输出
    --tb=short       # 简短回溯
    --strict-markers # 严格标记
    --disable-warnings  # 禁用警告

# 测试标记
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试
    e2e: 端到端测试
    smoke: 冒烟测试

# 测试运行配置
# -x: 遇到第一个失败就停止
# --maxfail=3: 最多失败3个就停止
# --cov: 覆盖率报告
# --cov-report: 覆盖率报告格式

# 示例：带覆盖率的运行命令
# pytest --cov=backend --cov-report=term-missing --cov-report=html

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 测试超时（秒）
timeout = 300

# 测试并行（可选）
# addopts = -n auto